<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Form</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
padding:40px;
}

form{
background:white;
padding:25px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

#msg{
margin-top:15px;
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<form id="studentForm">

<h2>Student Form</h2>

<input type="text" name="name" placeholder="Name" required>

<input type="number" name="age" placeholder="Age" required>

<input type="text" name="school" placeholder="School" required>

<textarea name="address" placeholder="Address" required></textarea>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="mobile" placeholder="Mobile Number" required>

<button type="submit">Submit</button>

<div id="msg"></div>

</form>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzfDY6j_nP9tj01hG8YRji0Yf_AhDNBmXI8uMZ9X6Bf_zpinWDnxK2tzMD4djhTevjD7Q/exec";

document.getElementById("studentForm").addEventListener("submit",async function(e){

e.preventDefault();

const form=e.target;

const data={
name:form.name.value,
age:form.age.value,
school:form.school.value,
address:form.address.value,
email:form.email.value,
mobile:form.mobile.value
};

try{

await fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
});

document.getElementById("msg").innerHTML="Submitted Successfully";

form.reset();

}
catch(err){

document.getElementById("msg").innerHTML="Submission Failed";

}

});

</script>

</body>
</html>
